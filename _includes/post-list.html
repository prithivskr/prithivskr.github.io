<ul class="post-list">
    {% for post in include.posts %}
        <li class="post-item">
            <article class="post-preview">
                <h2 class="post-preview-title">
                    <a href="{{ post.url }}">{{ post.title }}</a>
                </h2>
                <p class="post-meta">
                    &mdash;{{ post.date | date: "%B %e, %Y" }}
                    {% if post.author %}
                        , by {{ post.author }}
                    {% endif %}
                </p>
            </article>
        </li>
    {% endfor %}
</ul>
